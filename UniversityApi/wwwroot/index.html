<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Университет — Портал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title {
            font-size: 17px;
            font-weight: bold;
        }

        .badge {
            background: #27ae60;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.05em;
        }

        .nav {
            background: #34495e;
            display: flex;
            gap: 4px;
            padding: 8px 24px;
        }

            .nav button {
                background: transparent;
                color: #bdc3c7;
                border: none;
                padding: 8px 16px;
                cursor: pointer;
                border-radius: 4px;
                font-size: 14px;
            }

                .nav button:hover {
                    background: rgba(255,255,255,0.1);
                    color: white;
                }

                .nav button.active {
                    background: #27ae60;
                    color: white;
                }

        .content {
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 15px;
        }

        .readonly-badge {
            background: #f8f9fa;
            color: #666;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
            font-weight: normal;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
        }

            .btn-primary:hover {
                background: #219a52;
            }

        .btn-edit {
            background: #f39c12;
            color: white;
        }

            .btn-edit:hover {
                background: #d68910;
            }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

            .btn-delete:hover {
                background: #cb4335;
            }

        .btn-cancel {
            background: #95a5a6;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 11px 16px;
            text-align: left;
            font-size: 13px;
            color: #666;
            border-bottom: 1px solid #eee;
        }

        td {
            padding: 11px 16px;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #fafafa;
        }

        .page {
            display: none;
        }

            .page.active {
                display: block;
            }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

            .overlay.open {
                display: flex;
            }

        .modal {
            background: white;
            border-radius: 6px;
            padding: 24px;
            width: 420px;
            max-width: 90vw;
        }

            .modal h3 {
                margin-bottom: 18px;
                font-size: 16px;
            }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }

            input:focus, select:focus {
                border-color: #27ae60;
            }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 13px;
        }

        .grade-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
        }

        .grade-5 {
            background: #d5f5e3;
            color: #1e8449;
        }

        .grade-4 {
            background: #d6eaf8;
            color: #1a5276;
        }

        .grade-3 {
            background: #fef9e7;
            color: #9a7d0a;
        }

        .grade-2 {
            background: #fadbd8;
            color: #922b21;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
            z-index: 999;
        }

            .toast.error {
                background: #e74c3c;
            }

        .info-box {
            background: #eaf4fb;
            border: 1px solid #aed6f1;
            border-radius: 4px;
            padding: 10px 14px;
            font-size: 12px;
            color: #1a5276;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <span style="font-size:20px">🎓</span>
            <span class="header-title">Университет — Портал</span>
            <span class="badge">ПОЛЬЗОВАТЕЛЬ</span>
        </div>
    </div>

    <div class="nav">
        <button class="active" onclick="showPage('students', this)">Студенты</button>
        <button onclick="showPage('teachers', this)">Преподаватели</button>
        <button onclick="showPage('courses', this)">Дисциплины</button>
        <button onclick="showPage('grades', this)">Оценки</button>
    </div>

    <div class="content">

        <!-- Студенты -->
        <div class="page active" id="page-students">
            <div class="card">
                <div class="card-header">
                    Студенты
                    <button class="btn btn-primary" onclick="openModal('student')">+ Добавить</button>
                </div>
                <div id="students-body"><div class="loading">Загрузка...</div></div>
            </div>
        </div>

        <!-- Преподаватели -->
        <div class="page" id="page-teachers">
            <div class="card">
                <div class="card-header">
                    Преподаватели
                    <button class="btn btn-primary" onclick="openModal('teacher')">+ Добавить</button>
                </div>
                <div id="teachers-body"><div class="loading">Загрузка...</div></div>
            </div>
        </div>

        <!-- Дисциплины -->
        <div class="page" id="page-courses">
            <div class="card">
                <div class="card-header">
                    Дисциплины
                    <button class="btn btn-primary" onclick="openModal('course')">+ Добавить</button>
                </div>
                <div id="courses-body"><div class="loading">Загрузка...</div></div>
            </div>
        </div>

        <!-- Оценки — только просмотр -->
        <div class="page" id="page-grades">
            <div class="card">
                <div class="card-header">
                    Оценки
                    <span class="readonly-badge">👁 Только просмотр</span>
                </div>
                <div class="info-box">ℹ️ Управление оценками доступно только администратору через панель WPF.</div>
                <div id="grades-body"><div class="loading">Загрузка...</div></div>
            </div>
        </div>

    </div>

    <!-- Модальное окно -->
    <div class="overlay" id="overlay" onclick="closeOutside(event)">
        <div class="modal">
            <h3 id="modal-title">Добавить</h3>
            <div id="modal-body"></div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn btn-primary" onclick="submitModal()">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let modalType = '', modalMode = 'create', modalId = null;
        let students = [], teachers = [], courses = [];

        function showPage(page, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            btn.classList.add('active');
            if (page === 'students') loadStudents();
            else if (page === 'teachers') loadTeachers();
            else if (page === 'courses') loadCourses();
            else loadGrades();
        }

        async function api(path, opts = {}) {
            const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
            if (res.status === 204) return null;
            if (!res.ok) throw new Error(res.status);
            return res.json();
        }

        async function loadStudents() {
            try {
                students = await api('/api/students');
                document.getElementById('students-body').innerHTML = students.length ? `<table><thead><tr><th>ID</th><th>Имя</th><th>Группа</th><th>Email</th><th>Действия</th></tr></thead><tbody>${students.map(s => `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.group}</td><td>${s.email}</td><td><button class="btn btn-edit" onclick="editStudent(${s.id})">Изменить</button> <button class="btn btn-delete" onclick="delStudent(${s.id})">Удалить</button></td></tr>`).join('')}</tbody></table>` : '<div class="empty">Нет студентов</div>';
            } catch { showToast('Ошибка загрузки', true); }
        }
        async function delStudent(id) { if (!confirm('Удалить?')) return; try { await api('/api/students/' + id, { method: 'DELETE' }); showToast('Удалено'); loadStudents(); } catch { showToast('Ошибка', true); } }
        function editStudent(id) { openModal('student', 'edit', students.find(s => s.id === id)); }

        async function loadTeachers() {
            try {
                teachers = await api('/api/teachers');
                document.getElementById('teachers-body').innerHTML = teachers.length ? `<table><thead><tr><th>ID</th><th>Имя</th><th>Кафедра</th><th>Действия</th></tr></thead><tbody>${teachers.map(t => `<tr><td>${t.id}</td><td>${t.name}</td><td>${t.department}</td><td><button class="btn btn-edit" onclick="editTeacher(${t.id})">Изменить</button> <button class="btn btn-delete" onclick="delTeacher(${t.id})">Удалить</button></td></tr>`).join('')}</tbody></table>` : '<div class="empty">Нет преподавателей</div>';
            } catch { showToast('Ошибка загрузки', true); }
        }
        async function delTeacher(id) { if (!confirm('Удалить?')) return; try { await api('/api/teachers/' + id, { method: 'DELETE' }); showToast('Удалено'); loadTeachers(); } catch { showToast('Ошибка', true); } }
        function editTeacher(id) { openModal('teacher', 'edit', teachers.find(t => t.id === id)); }

        async function loadCourses() {
            try {
                if (!teachers.length) teachers = await api('/api/teachers');
                courses = await api('/api/courses');
                document.getElementById('courses-body').innerHTML = courses.length ? `<table><thead><tr><th>ID</th><th>Название</th><th>Преподаватель</th><th>Действия</th></tr></thead><tbody>${courses.map(c => { const t = teachers.find(x => x.id === c.teacherId); return `<tr><td>${c.id}</td><td>${c.title}</td><td>${t ? t.name : '—'}</td><td><button class="btn btn-edit" onclick="editCourse(${c.id})">Изменить</button> <button class="btn btn-delete" onclick="delCourse(${c.id})">Удалить</button></td></tr>`; }).join('')}</tbody></table>` : '<div class="empty">Нет дисциплин</div>';
            } catch { showToast('Ошибка загрузки', true); }
        }
        async function delCourse(id) { if (!confirm('Удалить?')) return; try { await api('/api/courses/' + id, { method: 'DELETE' }); showToast('Удалено'); loadCourses(); } catch { showToast('Ошибка', true); } }
        function editCourse(id) { openModal('course', 'edit', courses.find(c => c.id === id)); }

        async function loadGrades() {
            try {
                if (!students.length) students = await api('/api/students');
                if (!courses.length) courses = await api('/api/courses');
                const grades = await api('/api/grades');
                document.getElementById('grades-body').innerHTML = grades.length ? `<table><thead><tr><th>ID</th><th>Студент</th><th>Дисциплина</th><th>Оценка</th><th>Дата</th></tr></thead><tbody>${grades.map(g => { const s = students.find(x => x.id === g.studentId); const c = courses.find(x => x.id === g.courseId); return `<tr><td>${g.id}</td><td>${s ? s.name : '—'}</td><td>${c ? c.title : '—'}</td><td><span class="grade-badge grade-${g.value}">${g.value}</span></td><td>${new Date(g.date).toLocaleDateString('ru-RU')}</td></tr>`; }).join('')}</tbody></table>` : '<div class="empty">Нет оценок</div>';
            } catch { showToast('Ошибка загрузки', true); }
        }

        async function openModal(type, mode = 'create', data = null) {
            modalType = type; modalMode = mode; modalId = data?.id ?? null;
            const names = { student: 'студента', teacher: 'преподавателя', course: 'дисциплину' };
            document.getElementById('modal-title').textContent = (mode === 'edit' ? 'Редактировать ' : 'Добавить ') + names[type];
            if (type === 'student') {
                document.getElementById('modal-body').innerHTML = `<div class="form-group"><label>Имя</label><input id="f-name" value="${data?.name ?? ''}"></div><div class="form-group"><label>Группа</label><input id="f-group" value="${data?.group ?? ''}"></div><div class="form-group"><label>Email</label><input id="f-email" value="${data?.email ?? ''}"></div>`;
            } else if (type === 'teacher') {
                document.getElementById('modal-body').innerHTML = `<div class="form-group"><label>Имя</label><input id="f-name" value="${data?.name ?? ''}"></div><div class="form-group"><label>Кафедра</label><input id="f-dept" value="${data?.department ?? ''}"></div>`;
            } else if (type === 'course') {
                if (!teachers.length) teachers = await api('/api/teachers');
                document.getElementById('modal-body').innerHTML = `<div class="form-group"><label>Название</label><input id="f-title" value="${data?.title ?? ''}"></div><div class="form-group"><label>Преподаватель</label><select id="f-teacher">${teachers.map(t => `<option value="${t.id}" ${data?.teacherId === t.id ? 'selected' : ''}>${t.name}</option>`).join('')}</select></div>`;
            }
            document.getElementById('overlay').classList.add('open');
        }
        function closeModal() { document.getElementById('overlay').classList.remove('open'); }
        function closeOutside(e) { if (e.target.id === 'overlay') closeModal(); }

        async function submitModal() {
            try {
                let body, path, method;
                if (modalType === 'student') { body = { name: document.getElementById('f-name').value, group: document.getElementById('f-group').value, email: document.getElementById('f-email').value }; path = modalMode === 'edit' ? '/api/students/' + modalId : '/api/students'; method = modalMode === 'edit' ? 'PUT' : 'POST'; if (modalMode === 'edit') body.id = modalId; }
                else if (modalType === 'teacher') { body = { name: document.getElementById('f-name').value, department: document.getElementById('f-dept').value }; path = modalMode === 'edit' ? '/api/teachers/' + modalId : '/api/teachers'; method = modalMode === 'edit' ? 'PUT' : 'POST'; if (modalMode === 'edit') body.id = modalId; }
                else if (modalType === 'course') { body = { title: document.getElementById('f-title').value, teacherId: +document.getElementById('f-teacher').value }; path = modalMode === 'edit' ? '/api/courses/' + modalId : '/api/courses'; method = modalMode === 'edit' ? 'PUT' : 'POST'; if (modalMode === 'edit') body.id = modalId; }
                await api(path, { method, body: JSON.stringify(body) });
                closeModal(); showToast('Сохранено');
                if (modalType === 'student') loadStudents();
                else if (modalType === 'teacher') loadTeachers();
                else loadCourses();
            } catch { showToast('Ошибка сохранения', true); }
        }

        function showToast(msg, isError = false) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast' + (isError ? ' error' : ''); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }

        loadStudents();
    </script>
</body>
</html>
